<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair SOP 分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#222535;--border:#2e3247;--accent:#6ee7b7;--accent2:#f59e0b;--accent3:#818cf8;--text:#e2e8f0;--muted:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding:24px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(110,231,183,.04),transparent 60%),radial-gradient(ellipse 50% 60% at 85% 90%,rgba(129,140,248,.04),transparent 60%);pointer-events:none;z-index:0;}
.wrap{max-width:1400px;margin:0 auto;position:relative;z-index:1;}
header{margin-bottom:24px;}
header h1{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--accent);letter-spacing:-.5px;margin-bottom:4px;}
header p{font-size:12px;color:var(--muted);}
.lv1-tabs{display:flex;gap:8px;margin-bottom:20px;}
.lv1-tab{padding:10px 32px;border-radius:8px;cursor:pointer;font-size:14px;font-family:'JetBrains Mono',monospace;font-weight:700;border:2px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;}
.lv1-tab:hover{color:var(--text);}
.lv1-tab[data-prod="PCIe"].active{background:#6ee7b7;color:#0f1117;border-color:#6ee7b7;}
.lv1-tab[data-prod="SATA"].active{background:#f59e0b;color:#0f1117;border-color:#f59e0b;}
.lv1-tab[data-prod="USB"].active{background:#818cf8;color:#0f1117;border-color:#818cf8;}
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .2s;}
.scard:hover{transform:translateY(-1px);border-color:var(--accent2);}
.scard.active{border-color:var(--accent2);background:rgba(245,158,11,.07);}
.scard.unavail{opacity:.3;cursor:default;pointer-events:none;}
.scard-type{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;margin-bottom:4px;}
.scard-val{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.scard-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;}
.card-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.card-title::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--accent);display:inline-block;flex-shrink:0;}
.sop-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.sop-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.sop-header h2{font-size:15px;font-family:'JetBrains Mono',monospace;color:var(--accent2);}
.sop-meta{font-size:11px;color:var(--muted);}
.sop-list{display:flex;flex-direction:column;gap:7px;}
.sop-item{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;display:grid;grid-template-columns:34px 1fr 52px;align-items:center;gap:10px;}
.sop-rank{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:center;}
.sop-text{font-size:11px;color:var(--text);line-height:1.5;}
.bar-fill{height:3px;border-radius:2px;background:var(--accent2);margin-top:5px;opacity:.65;}
.sop-count{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent2);text-align:right;}
.empty-msg{text-align:center;padding:32px;color:var(--muted);font-size:13px;}
@media(max-width:800px){.chart-row{grid-template-columns:1fr;}.lv1-tabs{flex-wrap:wrap;}}
</style>
</head>

</div>

const RT_ORDER = ['ENG','FAE','RT','FLH','CTL','MST','OP','RP1','DDR','BIN'];
const COLORS   = ['#6ee7b7','#f59e0b','#818cf8','#f472b6','#38bdf8','#fb923c','#a78bfa','#34d399','#fbbf24','#60a5fa'];

let curProd = 'PCIe', curRT = null, rtChart = null, typeChart = null;

Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#2e3247';
Chart.defaults.font.family = "'Noto Sans TC', sans-serif";

function selectProduct(prod) {
  curProd = prod; curRT = null;
  document.querySelectorAll('.lv1-tab').forEach(t => t.classList.toggle('active', t.dataset.prod === prod));
  renderSummary();
  renderCharts();
  clearSOP();
}

function selectRT(rt) {
  const d = DATA[curProd][rt];
  if (!d) return;
  curRT = rt;
  document.querySelectorAll('.scard').forEach(c => c.classList.toggle('active', c.dataset.rt === rt));
  renderSOP(rt, d);
}

function renderSummary() {
  const pd = DATA[curProd];
  document.getElementById('summaryRow').innerHTML = RT_ORDER.map((rt, i) => {
    const d = pd[rt];
    if (!d) return `<div class="scard unavail"><div class="scard-type" style="color:${COLORS[i]}">${rt}</div><div class="scard-val" style="font-size:14px;color:var(--muted)">—</div><div class="scard-sub">無資料</div></div>`;
    return `<div class="scard" data-rt="${rt}" onclick="selectRT('${rt}')">
      <div class="scard-type" style="color:${COLORS[i]}">${rt}</div>
      <div class="scard-val">${d.total}</div>
      <div class="scard-sub">${d.types} 種SOP</div>
    </div>`;
  }).join('');
}

function renderCharts() {
  const pd = DATA[curProd];
  const labels = RT_ORDER.filter(rt => pd[rt]);
  const totals = labels.map(rt => pd[rt].total);
  const types  = labels.map(rt => pd[rt].types);
  const colors = labels.map(rt => COLORS[RT_ORDER.indexOf(rt)]);

  if (rtChart) rtChart.destroy();
  if (typeChart) typeChart.destroy();

  rtChart = new Chart(document.getElementById('rtChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: totals, backgroundColor: colors, borderRadius: 5, borderSkipped: false }] },
    options: { plugins:{ legend:{display:false} }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(46,50,71,.5)'}} } }
  });
  typeChart = new Chart(document.getElementById('typeChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: types, backgroundColor: colors.map(c=>c+'99'), borderColor: colors, borderWidth:1.5, borderRadius:5 }] },
    options: { plugins:{ legend:{display:false} }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'rgba(46,50,71,.5)'}} } }
  });
}

function renderSOP(rt, d) {
  document.getElementById('sopTitle').textContent = `${curProd}  →  ${rt}`;
  document.getElementById('sopMeta').textContent = `共 ${d.total} 筆  ／  ${d.types} 種 SOP（顯示 Top ${d.top.length}）`;
  const maxV = Math.max(...d.top.map(i => i[1]));
  document.getElementById('sopList').innerHTML = d.top.map(([sop, cnt], idx) =>
    `<div class="sop-item">
      <div class="sop-rank">#${idx+1}</div>
      <div>
        <div class="sop-text">${sop}</div>
        <div class="bar-fill" style="width:${Math.round(cnt/maxV*100)}%"></div>
      </div>
      <div class="sop-count">${cnt}</div>
    </div>`
  ).join('');
}

function clearSOP() {
  document.getElementById('sopTitle').textContent = '請點選上方 Repair_Type 卡片';
  document.getElementById('sopMeta').textContent = '';
  document.getElementById('sopList').innerHTML = '<div class="empty-msg">點選 Repair_Type 卡片查看 SOP 排行明細</div>';
}

selectProduct('PCIe');
</script>
